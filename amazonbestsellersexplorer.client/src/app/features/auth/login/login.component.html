<div class="login-container">
  <div class="back-nav">
    <p-button icon="pi pi-arrow-left" label="Back to Home" [text]="true" routerLink="/"></p-button>
  </div>
  <p-card styleClass="login-card shadow-4 border-round-xl">
    <ng-template #title>
      <div class="card-title">
        <i class="pi pi-user"></i>
        Welcome Back
      </div>
    </ng-template>

    <form #loginForm="ngForm" (ngSubmit)="loginForm.valid && loginUser()">
      <div class="form-container">
        <div class="input-group">
          <label for="login">Username</label>
          <input pInputText id="login" name="login" [(ngModel)]="login" required minlength="5" maxlength="50" class="w-full" />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <p-password id="password" name="password" [(ngModel)]="password" required [toggleMask]="true" [feedback]="false" styleClass="w-full" inputStyleClass="w-full"></p-password>
        </div>

        <p-message *ngIf="message()" severity="error" [text]="message()" styleClass="block w-full"></p-message>

        <p-button type="submit" label="Sign In" icon="pi pi-sign-in" styleClass="w-full mt-2" [disabled]="!loginForm.valid || isLoading()" [loading]="isLoading()"></p-button>

        <div class="register-link-container">
          Don't have an account? <a routerLink="/register">Register</a>
        </div>
      </div>
    </form>
  </p-card>
</div>
