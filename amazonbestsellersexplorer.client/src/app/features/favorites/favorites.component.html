<app-navbar
    [isFavorites]="true"
    (onFavorites)="goHome()"
    (onLogout)="logout()">
</app-navbar>

<div class="favorites-container">
    <div class="page-header">
        <h1 class="page-title">Moje ulubione produkty</h1>
        <p class="page-subtitle">Twoje zapisane bestsellery Amazona</p>
    </div>

    <div class="product-grid-wrapper">
        <app-product-list
            [products]="products()"
            [favoriteAsins]="amazonService.favoriteAsins()"
            [isLoadingFavorite]="amazonService.isLoadingFavorite()"
            [loggedUser]="authService.currentUser() || 'none'"
            [error]="error"
            emptyMessage="Nie masz jeszcze żadnych ulubionych produktów."
            (toggleFavoriteAction)="handleToggle($event)">
        </app-product-list>
    </div>
</div>
