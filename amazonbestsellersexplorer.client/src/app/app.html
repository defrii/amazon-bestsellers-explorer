<div style="padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  <h2 style="color: #2c3e50;">Prognoza pogody z API</h2>

  <div *ngIf="forecasts().length > 0; else loading">
    <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
      <thead style="background-color: #f8f9fa;">
        <tr>
          <th style="padding: 12px; text-align: left;">Data</th>
          <th style="padding: 12px; text-align: left;">Temp. (C)</th>
          <th style="padding: 12px; text-align: left;">Podsumowanie</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of forecasts()" style="border-bottom: 1px solid #ddd;">
          <td style="padding: 12px;">{{ f.date }}</td>
          <td style="padding: 12px;">{{ f.temperatureC }}°C</td>
          <td style="padding: 12px;">{{ f.summary }}</td>
        </tr>
      </tbody>
    </table>

    <p style="margin-top: 15px; color: #666; font-size: 0.9em;">
      Otrzymano {{ forecasts().length }} rekordów.
    </p>
  </div>

  <ng-template #loading>
    <div style="padding: 20px; text-align: center; color: #3498db;">
      <strong>Ładowanie danych...</strong>
    </div>
  </ng-template>
</div>
