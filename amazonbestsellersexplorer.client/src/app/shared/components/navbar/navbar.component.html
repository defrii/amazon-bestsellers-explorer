<p-toolbar>
    <div class="p-toolbar-group-start">
        <h2 class="toolbar-title">
            Amazon BestSellers Explorer
        </h2>
    </div>
    <div class="p-toolbar-group-end toolbar-actions">
        <span *ngIf="loggedUser !== 'none'" class="user-greeting">
            <i class="pi pi-user"></i> {{ loggedUser }}
        </span>
        <p-button *ngIf="loggedUser === 'none'" label="Zaloguj" icon="pi pi-sign-in" severity="secondary"
            (onClick)="onLogin.emit()"></p-button>
        <p-button *ngIf="loggedUser === 'none'" label="Zarejestruj" icon="pi pi-user-plus"
            (onClick)="onRegister.emit()"></p-button>
        <p-button *ngIf="loggedUser !== 'none'" label="Moje ulubione" icon="pi pi-heart-fill" severity="danger"
            [outlined]="!isFavorites" (onClick)="onFavorites.emit()"></p-button>
        <p-button *ngIf="loggedUser !== 'none'" label="Wyloguj" icon="pi pi-sign-out" severity="danger"
            (onClick)="onLogout.emit()"></p-button>
    </div>
</p-toolbar>
